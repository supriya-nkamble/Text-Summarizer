[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: requires model artifacts and internet access"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
no_error_summary = true
